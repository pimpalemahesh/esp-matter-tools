<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ESP Matter Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        p.subtitle {
            margin-top: 12px;
            font-size: 1.1rem;
            color: #6b7280;
        }

        .tools-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 90%;
            max-width: 900px;
            margin: 50px 0;
        }

        .tool-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            text-align: left;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        .tool-card h2 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
        }

        .tool-card p {
            margin: 0 0 18px 0;
            font-size: 0.95rem;
            color: #4b5563;
        }

        .tool-link {
            display: inline-block;
            padding: 10px 18px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }

        .tool-link:hover {
            background: #125aa3;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.9rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <h1>ESP Matter Tools</h1>
        <p class="subtitle">
            Web-based Utilities for ESP-Matter Development
        </p>
    </header>

    <div class="tools-container">
        <div class="tool-card">
            <h2>Device Data Model Validator</h2>
            <p>
                Parse wildcard logs and validate device compliance
                against Matter data model specifications.
            </p>
            <a class="tool-link" href="dmv_tool/">Open Tool</a>
        </div>
    </div>

    <footer>
        © 2026 Espressif Systems (Shanghai) Co., Ltd.
    </footer>
</body>

</html>
