name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feat/dm-comparator]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir public

          cp index.html public/index.html

          mkdir -p public/dmv_tool
          cp -r dmv_tool/ui/* public/dmv_tool/

          mkdir -p public/dm_diff_tool
          cp dm_diff_tool/index.html public/dm_diff_tool/
          cp dm_diff_tool/diff_engine.py public/dm_diff_tool/
          cp -r dm_diff_tool/static public/dm_diff_tool/
          cp -r dm_diff_tool/data_model public/dm_diff_tool/

          python3 dm_diff_tool/generate_manifest.py
          cp dm_diff_tool/data_manifest.json public/dm_diff_tool/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
