name: Deploy to GitHub Pages

on:
  push:
    branches: [main, ui/mfg-tool]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir public

          # Copy hub index (links to each tool under its subpath)
          cp index.html public/index.html

          # DMV Tool → /dmv_tool/
          mkdir -p public/dmv_tool
          cp -r dmv_tool/ui/* public/dmv_tool/

          # MFG Tool → /mfg_tool/ (same layout as repo: index.html, css/, js/, py/)
          mkdir -p public/mfg_tool
          cp -r mfg_tool/ui/* public/mfg_tool/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
